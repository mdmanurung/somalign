      - text: "Two-pass global and local alignment"
        href: articles/two-pass.html
      - text: Algorithm and interpretation
        href: articles/algorithm.html
      - text: "Validating and tuning label transfer"
        href: articles/validating-label-transfer.html
      - text: API smoke test
        href: articles/function-coverage.html
    github:
      icon: fab fa-github fa-lg
      aria-label: GitHub repository
      href: https://github.com/mdmanurung/somalign

